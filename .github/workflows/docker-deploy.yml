name: Docker Deploy africademy-be

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-africademy-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_PORT: ${{ secrets.C3_SSH_PORT }}
  DEPLOY_PATH: /opt/docker/testing_backend
  COMPOSE_PATH: /opt/docker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.C3_SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ secrets.C3_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure deploy path exists
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} '
            sudo mkdir -p "${{ env.DEPLOY_PATH }}/var/log" "${{ env.DEPLOY_PATH }}/var/storage" "${{ env.DEPLOY_PATH }}/config/jwt"
            sudo chown -R "${{ secrets.C3_SSH_USER }}:${{ secrets.C3_SSH_USER }}" "${{ env.DEPLOY_PATH }}"
          '

      - name: Rsync source to server
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.idea/' \
            --exclude='.claude/' \
            --exclude='.vscode/' \
            --exclude='.DS_Store' \
            --exclude='var/' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            --exclude='public/build/' \
            --exclude='tests/' \
            --exclude='config/jwt/' \
            --exclude='.env.local' \
            --exclude='.env.local.php' \
            --exclude='.env.*.local' \
            --exclude='*.log' \
            --exclude='CLAUDE.md' \
            -e "ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Write .env.local on Server
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "umask 077 && cat > '${{ env.DEPLOY_PATH }}/.env.local' && chmod 600 '${{ env.DEPLOY_PATH }}/.env.local'" <<'EOF'
          APP_ENV=prod
          APP_SECRET=${{ secrets.APP_SECRET }}
          APP_BASE_URL=${{ vars.APP_BASE_URL }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MAILER_DSN=${{ secrets.MAILER_DSN }}
          JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
          JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
          JWT_PASSPHRASE=${{ secrets.JWT_PASSPHRASE }}
          APP_SODIUM_AEAD_KEY=${{ secrets.APP_SODIUM_AEAD_KEY }}
          PAYFAST_SANDBOX=${{ vars.PAYFAST_SANDBOX }}
          PAYFAST_MERCHANT_ID=${{ secrets.PAYFAST_MERCHANT_ID }}
          PAYFAST_MERCHANT_KEY=${{ secrets.PAYFAST_MERCHANT_KEY }}
          PAYFAST_PASSPHRASE=${{ secrets.PAYFAST_PASSPHRASE }}
          PAYFAST_RETURN_URL=${{ vars.PAYFAST_RETURN_URL }}
          PAYFAST_CANCEL_URL=${{ vars.PAYFAST_CANCEL_URL }}
          PAYFAST_NOTIFY_URL=${{ vars.PAYFAST_NOTIFY_URL }}
          BROWSER_SHOT_NODE_BINARY=${{ vars.BROWSER_SHOT_NODE_BINARY }}
          BROWSER_SHOT_NPM_BINARY=${{ vars.BROWSER_SHOT_NPM_BINARY }}
          EOF

      - name: Write JWT Private Key on Server
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "umask 077 && cat > '${{ env.DEPLOY_PATH }}/config/jwt/private.pem' && chmod 600 '${{ env.DEPLOY_PATH }}/config/jwt/private.pem'" <<'EOF'
          ${{ secrets.JWT_PRIVATE_KEY }}
          EOF

      - name: Write JWT Public Key on Server
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "umask 022 && cat > '${{ env.DEPLOY_PATH }}/config/jwt/public.pem' && chmod 644 '${{ env.DEPLOY_PATH }}/config/jwt/public.pem'" <<'EOF'
          ${{ secrets.JWT_PUBLIC_KEY }}
          EOF

      - name: Build and start testing_backend
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "cd '${{ env.COMPOSE_PATH }}' && sudo APP_USER='${{ secrets.C3_SSH_USER }}' docker compose up -d --build testing_backend"

      - name: Run database migrations
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "sudo docker compose -f '${{ env.COMPOSE_PATH }}/docker-compose.yml' exec -T --user '${{ secrets.C3_SSH_USER }}' testing_backend php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=prod --no-debug"

      - name: Clear Symfony Cache
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "sudo docker compose -f '${{ env.COMPOSE_PATH }}/docker-compose.yml' exec -T --user '${{ secrets.C3_SSH_USER }}' testing_backend php bin/console cache:clear --env=prod --no-debug"

      - name: Warmup Symfony Cache
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "sudo docker compose -f '${{ env.COMPOSE_PATH }}/docker-compose.yml' exec -T --user '${{ secrets.C3_SSH_USER }}' testing_backend php bin/console cache:warmup --env=prod --no-debug"

      - name: Recreate testing_scheduler
        run: |
          ssh -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.C3_SSH_USER }}@${{ secrets.C3_SSH_HOST }} \
            "cd '${{ env.COMPOSE_PATH }}' && sudo APP_USER='${{ secrets.C3_SSH_USER }}' docker compose up -d --force-recreate testing_scheduler"
