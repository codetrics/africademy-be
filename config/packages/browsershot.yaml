parameters:
    # Paths to the Node/NPM binaries Browsershot shells out to when rendering
    # PDFs, supplied via env vars. Deployments that install Node via nvm (see
    # Dockerfile) set the absolute paths through BROWSER_SHOT_NODE_BINARY /
    # BROWSER_SHOT_NPM_BINARY (docker-deploy.yml); local dev sets them in .env.
    app.browsershot.node_binary: '%env(BROWSER_SHOT_NODE_BINARY)%'
    app.browsershot.npm_binary: '%env(BROWSER_SHOT_NPM_BINARY)%'
    # Absolute path to the Chrome/Chromium binary. Passed explicitly to Browsershot
    # so rendering never depends on puppeteer's bundled-version cache lookup. The
    # Dockerfile sets PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium.
    app.browsershot.chrome_path: '%env(PUPPETEER_EXECUTABLE_PATH)%'
