monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - payfast # PayFast ITN webhook traffic (received / accepted / rejected reasons)

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!payfast"]
            payfast:
                type: stream
                path: "%kernel.logs_dir%/payfast.log"
                level: debug
                channels: [payfast]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!deprecation", "!payfast"]
            payfast:
                type: stream
                path: "%kernel.logs_dir%/payfast.log"
                level: debug
                channels: [payfast]
            deprecation:
                type: stream
                path: "%kernel.logs_dir%/deprecation.log"
                level: debug
                channels: [deprecation]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
