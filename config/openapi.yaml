openapi: 3.0.3
info:
    title: Africademy API
    version: 1.0.0
    contact:
        name: Africademy / CodeStudio
        email: dev@codestudio.co.za
    license:
        name: Proprietary
    description: |
        Africademy is a multi-course online learning platform. This is the
        **API-only** backend — every endpoint returns JSON under `/api/v1` and is
        authenticated per-request with a JWT bearer token (no sessions/cookies).

        ### Authentication & roles
        1. `POST /auth/register` — create a user + profile (returns **no** token). An
           `account_type` (`student` or `facilitator`) is required; facilitators are created
           pending admin approval and cannot log in until approved.
        2. `POST /auth/verify-email/request` then `POST /auth/verify-email` — verify the
           email with the OTP (some actions require a verified email).
        3. `POST /auth/login` — returns a JWT **access token** (TTL ~1h) and a
           **refresh token** (TTL ~30d).
        4. Send `Authorization: Bearer <access_token>` on every authenticated request.
        5. `POST /auth/refresh` — exchange the refresh token for a new access token.

        The issued JWT payload carries the user's ULID as the `id` claim. Token failures
        return a specific `401`: **expired** ("Token expired."), **invalid** ("Invalid
        token."), or **missing** ("Authentication required."). A logged-in user without the
        required role/ownership gets `403`.

        Roles are hierarchical: `ROLE_USER` ⊂ `ROLE_STUDENT` ⊂ `ROLE_FACILITATOR` ⊂ `ROLE_ADMIN`.
        Every account carries the base `ROLE_USER`; `ROLE_STUDENT`, `ROLE_FACILITATOR` and `ROLE_ADMIN`
        are grantable/revokeable. Students consume content; facilitators author courses/lessons/blog
        posts they own (record-level checks via voters); admins manage coupons, refunds, blog
        categories, analytics, the student and facilitator directories, and email campaigns.

        ### Public endpoints (no token)
        - `POST /auth/*` (register, login, refresh, verify-email, password reset)
        - `GET /blog/posts`, `GET /blog/posts/{slug}`, `GET /blog/categories`,
          `GET /blog/posts/{id}/cover`
        - `POST /newsletter/subscribe`, `GET /newsletter/unsubscribe`
        - `GET /certificates/verify/{credentialId}` — public certificate verification
        - `GET /open-api/docs` — this documentation

        ### Conventions
        - **Identifiers:** every resource is addressed by its **ULID** public id; internal
          auto-increment keys are never exposed.
        - **Timestamps:** all date/time fields are **Unix seconds** (integer).
          Convert in TS with `new Date(value * 1000)`.
        - **Pagination:** list endpoints accept `page` (default 1) and `limit` (capped at 100),
          and return a `pagination` object (`current_page`, `items_per_page`, `total_items`, `total_pages`).
        - **Money:** amounts are integer **cents** with an ISO currency (ZAR).
        - **Rate limiting:** all anonymous (unauthenticated) requests are capped at **60/minute per IP**;
          sensitive flows are stricter (registration / email-verification / password-reset / newsletter:
          **5 per 15 minutes**, login: **5 per 15 minutes**). Community writes (post/comment/like/upload)
          are capped at **20/minute per user**. Exceeding a limit returns `429 rate_limit_exceeded`.

        ### Error envelope
        **Every** error on an `/api` request returns this JSON shape — never an HTML page,
        including 404s and unexpected 500s:
        `{ "error": "<code>", "error_description": "<message>" }`.
        Common codes by status: `400` invalid_json / invalid_request · `401` unauthorized ·
        `403` (access denied) · `404` not_found · `409` conflict ·
        `422` validation_error · `429` rate_limit_exceeded ·
        `500` internal_server_error.

        ### Webhooks
        PayFast posts payment notifications (ITN) to `POST /webhooks/payfast/notify`
        (server-to-server; signature + amount validated). This is **not** a client endpoint.
        Charges/refunds simulate in sandbox (`PAYFAST_SANDBOX=true`) and call the live
        PayFast API otherwise.

        ### Key flows
        - **Access & purchase:** access is decided by one gate. **Free** courses grant
          access immediately. **Per-course** / **bundle** purchases return a signed PayFast
          checkout → ITN marks the order paid → an entitlement is granted and the student
          auto-enrolled. **Subscription** access covers all included courses while active.
        - **Learn:** enroll → `GET /courses/{id}/learn` (gated) for lessons + progress →
          stream lesson video → mark lessons complete → on finishing a certificate-enabled
          course (passing its quiz where required) a certificate is issued.
        - **Refund:** student opens a refund request (30-day window) → admin approval revokes
          the entitlement and triggers the PayFast refund.
        - **Recurring billing:** a scheduled job renews due subscriptions or expires
          cancelled ones.
servers:
    - url: http://be-preview.codetrics.co.za/api/v1
security:
    - bearerAuth: []
tags:
    - name: Auth
      description: >
        Registration, login (JWT access + refresh), token refresh, email verification (OTP),
        and password reset. Public — no token required. Register returns no token; log in afterwards.
    - name: Profile
      description: >
        The authenticated user's profile (separate from auth identity): name, bio, locale,
        and avatar upload/streaming. The avatar field is an absolute URL to the stream endpoint.
    - name: Catalog
      description: Public-facing course discovery — the paginated catalogue with search, category, and level filters.
    - name: Courses
      description: >
        Course CRUD for facilitators (own courses, record-level voter checks) and reads for students.
        Courses carry pricing flags (free / purchasable / included-in-subscription) that feed the access gate.
    - name: Lessons
      description: >
        Lesson authoring within a course (owner only) and reads for students. Lessons may host a
        video (upload + access-gated range streaming) or reference an external embed via content_ref.
    - name: Enrollment
      description: >
        Enroll the current student in a course and list enrollments. Enrolling requires access
        (free course, or an entitlement / active subscription); content stays gated until then.
    - name: Progress
      description: >
        The learn view (lessons + computed progress for a course) and marking lessons complete.
        Completing a certificate-enabled course issues a certificate.
    - name: Review
      description: >
        Course reviews & ratings. A student may review a course they are enrolled in once;
        posting/updating refreshes the course's cached rating average and count.
    - name: Certificate
      description: >
        Completion certificates (PDF). Issued automatically on completing a certificate-enabled
        course. Includes a public verification endpoint keyed by a URL-safe credential id.
    - name: Quiz
      description: >
        Course quizzes — questions, choices, and attempts. Where a course requires a quiz, passing
        it is part of the certificate gate. Correct-answer flags are never exposed to students.
    - name: Orders
      description: >
        One-off purchases (per-course or bundle) via signed PayFast checkout, plus the buyer's order
        history. Payment is confirmed asynchronously by the PayFast ITN webhook.
    - name: Subscription
      description: >
        Subscription plans, subscribe/cancel, and the payment ledger. Active subscriptions grant
        access to all included courses; renewals/expiry are handled by the billing scheduler. No refunds.
    - name: PaymentMethods
      description: >
        Saved PayFast card tokens (libsodium-encrypted), multiple per user with a default. Captured via a
        tokenization checkout routed through the ITN webhook; used for subscription charges.
    - name: Bundles
      description: >
        Facilitator-owned course bundles (a set of the owner's published courses) sold one-off. A paid bundle
        grants entitlements for every course in it and auto-enrolls the buyer.
    - name: Community
      description: >
        Community hub — posts (tag, body, optional image/link), comments, likes, and trending topics.
        Authors (or admins) edit/delete; all actions require a logged-in student.
    - name: Blog
      description: >
        Marketing blog. Reads are public; authoring (create/update/publish/cover) requires ROLE_FACILITATOR
        and is owner/admin-gated. Blog category management is admin-only.
    - name: Newsletter
      description: >
        Public, rate-limited newsletter signup with double opt-in (confirm by email) and a one-click
        token unsubscribe.
    - name: Analytics
      description: >
        Admin dashboard metrics — overview KPIs (users, revenue, MRR, subscriptions, enrollments,
        reviews), revenue & enrollment time-series, and top courses. ROLE_ADMIN only.
    - name: Admin
      description: >
        Admin operations — coupons, refund approval, blog categories, the student directory, the
        UserLog activity feed, and segmented email campaigns. ROLE_ADMIN only.
paths:
    /auth/register:
        post:
            tags: [Auth]
            summary: Register a new user
            description: >
                Creates a user and its profile. Returns no token — log in afterwards. Public endpoint.
                `account_type` selects the kind of account: `student` accounts get `ROLE_STUDENT` and
                are active immediately; `facilitator` accounts get `ROLE_FACILITATOR` straight away but stay
                pending admin approval and cannot log in until approved.
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, password, first_name, last_name, account_type]
                            properties:
                                email: { type: string, format: email, example: jane@example.com }
                                password: { type: string, format: password, minLength: 8, example: s3cretpass }
                                first_name: { type: string, example: Jane }
                                last_name: { type: string, example: Doe }
                                account_type: { type: string, enum: [student, facilitator], example: student }
            responses:
                '201':
                    description: User created
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    user: { $ref: '#/components/schemas/User' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /auth/login:
        post:
            tags: [Auth]
            summary: Authenticate and obtain tokens
            description: >
                Returns a JWT access token and a refresh token. Public endpoint. Non-active accounts
                are rejected with `401` and a specific message: pending facilitators ("Your account is
                pending review."), rejected facilitators ("Your account application was rejected."), and
                suspended accounts ("Your account has been suspended.").
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, password]
                            properties:
                                email: { type: string, format: email, example: jane@example.com }
                                password: { type: string, format: password, example: s3cretpass }
            responses:
                '200':
                    description: Authenticated
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token: { type: string, description: JWT access token (TTL 1h) }
                                    refresh_token: { type: string, description: Refresh token (TTL 30d) }
                            example:
                                token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJpYXQiOjE3...
                                refresh_token: 9c1f0e...d2b7
                '401': { $ref: '#/components/responses/Unauthorized' }
    /auth/refresh:
        post:
            tags: [Auth]
            summary: Exchange a refresh token for a new access token
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [refresh_token]
                            properties:
                                refresh_token: { type: string }
            responses:
                '200':
                    description: New tokens issued
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token: { type: string }
                                    refresh_token: { type: string }
                '401': { $ref: '#/components/responses/Unauthorized' }
    /auth/verify-email/request:
        post:
            tags: [Auth]
            summary: Request an email-verification code
            description: Always returns 200 (does not reveal whether the email exists).
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email]
                            properties:
                                email: { type: string, format: email }
            responses:
                '200': { description: Code sent if the email exists }
                '400': { $ref: '#/components/responses/BadRequest' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /auth/verify-email:
        post:
            tags: [Auth]
            summary: Verify an email with a code
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, code]
                            properties:
                                email: { type: string, format: email }
                                code: { type: string, example: '314832' }
            responses:
                '200': { description: Email verified }
                '400': { $ref: '#/components/responses/BadRequest' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /auth/password/forgot:
        post:
            tags: [Auth]
            summary: Request a password-reset code
            description: Always returns 200 (does not reveal whether the email exists).
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email]
                            properties:
                                email: { type: string, format: email }
            responses:
                '200': { description: Code sent if the email exists }
                '400': { $ref: '#/components/responses/BadRequest' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /auth/password/reset:
        post:
            tags: [Auth]
            summary: Reset a password with a code
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email, code, password]
                            properties:
                                email: { type: string, format: email }
                                code: { type: string, example: '289430' }
                                password: { type: string, format: password, minLength: 8 }
            responses:
                '200': { description: Password updated }
                '400': { $ref: '#/components/responses/BadRequest' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /profile:
        get:
            tags: [Profile]
            summary: Get the authenticated user's profile
            responses:
                '200':
                    description: The profile
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    profile: { $ref: '#/components/schemas/Profile' }
                '401': { $ref: '#/components/responses/Unauthorized' }
        patch:
            tags: [Profile]
            summary: Update the authenticated user's profile
            description: All fields optional; only provided fields are updated.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                first_name: { type: string }
                                last_name: { type: string }
                                bio: { type: string, nullable: true }
                                phone: { type: string, nullable: true }
                                locale: { type: string, example: en }
                                timezone: { type: string, example: Africa/Johannesburg }
            responses:
                '200':
                    description: Updated profile
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    profile: { $ref: '#/components/schemas/Profile' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /profile/avatar:
        get:
            tags: [Profile]
            summary: Stream the authenticated user's avatar image
            responses:
                '200':
                    description: The avatar image
                    content:
                        image/*:
                            schema: { type: string, format: binary }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Profile]
            summary: Upload or replace the avatar
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required: [avatar]
                            properties:
                                avatar:
                                    type: string
                                    format: binary
                                    description: JPEG, PNG or WebP, max 2 MB
            responses:
                '200':
                    description: Updated profile with new avatar URL
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    profile: { $ref: '#/components/schemas/Profile' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '422': { $ref: '#/components/responses/ValidationError' }
        delete:
            tags: [Profile]
            summary: Remove the avatar
            responses:
                '204': { description: Avatar removed }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '404': { $ref: '#/components/responses/NotFound' }
    /categories:
        get:
            tags: [Catalog]
            summary: List course categories
            responses:
                '200':
                    description: Categories
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    categories:
                                        type: array
                                        items: { $ref: '#/components/schemas/Category' }
                '401': { $ref: '#/components/responses/Unauthorized' }
    /courses:
        get:
            tags: [Courses]
            summary: List courses (paginated)
            description: Returns published courses. Facilitators also see their own drafts.
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
                - { name: category, in: query, schema: { type: string }, description: Category slug }
                - { name: level, in: query, schema: { type: string, enum: [beginner, intermediate, advanced] } }
                - { name: q, in: query, schema: { type: string }, description: Title search }
            responses:
                '200':
                    description: Paginated courses
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    courses:
                                        type: array
                                        items: { $ref: '#/components/schemas/Course' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '401': { $ref: '#/components/responses/Unauthorized' }
        post:
            tags: [Courses]
            summary: Create a course (draft)
            description: Requires ROLE_FACILITATOR. The slug is generated from the title.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [title, category_id]
                            properties:
                                title: { type: string }
                                category_id: { type: string, description: Category ULID }
                                description: { type: string, nullable: true }
                                tagline: { type: string, nullable: true }
                                level: { type: string, enum: [beginner, intermediate, advanced] }
                                price_amount_cents: { type: integer, example: 450000 }
                                price_currency: { type: string, example: ZAR }
                                tags: { type: array, items: { type: string } }
                                objectives: { type: array, items: { type: string } }
                                thumbnail: { type: string, nullable: true }
                                is_free: { type: boolean }
                                is_purchasable: { type: boolean }
                                included_in_subscription: { type: boolean }
                                certificate_enabled: { type: boolean }
                                requires_quiz: { type: boolean }
            responses:
                '201':
                    description: Created course
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    course: { $ref: '#/components/schemas/Course' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /courses/{id}:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
        get:
            tags: [Courses]
            summary: Get a course
            responses:
                '200':
                    description: The course
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    course: { $ref: '#/components/schemas/Course' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '404': { $ref: '#/components/responses/NotFound' }
        patch:
            tags: [Courses]
            summary: Update a course (owner only)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title: { type: string }
                                category_id: { type: string }
                                description: { type: string, nullable: true }
                                tagline: { type: string, nullable: true }
                                level: { type: string, enum: [beginner, intermediate, advanced] }
                                price_amount_cents: { type: integer }
                                price_currency: { type: string }
                                tags: { type: array, items: { type: string } }
                                objectives: { type: array, items: { type: string } }
                                thumbnail: { type: string, nullable: true }
                                is_free: { type: boolean }
                                is_purchasable: { type: boolean }
                                included_in_subscription: { type: boolean }
                                certificate_enabled: { type: boolean }
                                requires_quiz: { type: boolean }
            responses:
                '200':
                    description: Updated course
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    course: { $ref: '#/components/schemas/Course' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
        delete:
            tags: [Courses]
            summary: Delete a course (owner only)
            responses:
                '204': { description: Course deleted }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{id}/publish:
        post:
            tags: [Courses]
            summary: Publish a course (owner only)
            parameters:
                - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
            responses:
                '200':
                    description: Published course
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    course: { $ref: '#/components/schemas/Course' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{courseId}/lessons:
        parameters:
            - { name: courseId, in: path, required: true, schema: { type: string }, description: Course ULID }
        get:
            tags: [Lessons]
            summary: List a course's lessons
            description: Non-owners see published lessons only.
            responses:
                '200':
                    description: Lessons (ordered by position)
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    lessons:
                                        type: array
                                        items: { $ref: '#/components/schemas/Lesson' }
                '401': { $ref: '#/components/responses/Unauthorized' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Lessons]
            summary: Add a lesson (owner only)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [title, type]
                            properties:
                                title: { type: string }
                                type: { type: string, enum: [video, doc] }
                                body: { type: string, nullable: true }
                                status: { type: string, enum: [draft, published] }
                                duration_minutes: { type: integer, nullable: true }
                                content_ref: { type: string, nullable: true }
                                position: { type: integer }
            responses:
                '201':
                    description: Created lesson
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    lesson: { $ref: '#/components/schemas/Lesson' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /courses/{courseId}/lessons/{id}:
        parameters:
            - { name: courseId, in: path, required: true, schema: { type: string }, description: Course ULID }
            - { name: id, in: path, required: true, schema: { type: string }, description: Lesson ULID }
        get:
            tags: [Lessons]
            summary: Get a lesson
            responses:
                '200':
                    description: The lesson
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    lesson: { $ref: '#/components/schemas/Lesson' }
                '404': { $ref: '#/components/responses/NotFound' }
        patch:
            tags: [Lessons]
            summary: Update a lesson (owner only)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title: { type: string }
                                type: { type: string, enum: [video, doc] }
                                body: { type: string, nullable: true }
                                status: { type: string, enum: [draft, published] }
                                duration_minutes: { type: integer, nullable: true }
                                content_ref: { type: string, nullable: true }
                                position: { type: integer }
            responses:
                '200':
                    description: Updated lesson
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    lesson: { $ref: '#/components/schemas/Lesson' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
        delete:
            tags: [Lessons]
            summary: Delete a lesson (owner only)
            responses:
                '204': { description: Lesson deleted }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{courseId}/lessons/{id}/video:
        parameters:
            - { name: courseId, in: path, required: true, schema: { type: string }, description: Course ULID }
            - { name: id, in: path, required: true, schema: { type: string }, description: Lesson ULID }
        get:
            tags: [Lessons]
            summary: Stream a lesson's hosted video
            description: >-
                Access-gated: the course owner, or a student with a valid entitlement to a published lesson
                (same gate as the learn view). Returns the video with HTTP Range support (206 partial content)
                for seeking; served via X-Sendfile when available.
            responses:
                '200': { description: The video binary (supports Range), content: { 'video/*': { schema: { type: string, format: binary } } } }
                '206': { description: Partial content (Range request) }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Lessons]
            summary: Upload a lesson video (owner only)
            description: Accepts MP4, WebM or QuickTime. Replaces any existing video. Stored as platform-hosted media (distinct from content_ref embeds).
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required: [video]
                            properties:
                                video: { type: string, format: binary }
            responses:
                '200':
                    description: Lesson with stored video
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    lesson: { $ref: '#/components/schemas/Lesson' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '413': { $ref: '#/components/responses/PayloadTooLarge' }
                '422': { $ref: '#/components/responses/ValidationError' }
        delete:
            tags: [Lessons]
            summary: Remove a lesson's hosted video (owner only)
            responses:
                '204': { description: Video removed }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{id}/enroll:
        post:
            tags: [Enrollment]
            summary: Enroll the current student in a course
            description: Course must be published. Creates a pending (unpaid) enrollment.
            parameters:
                - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
            responses:
                '201':
                    description: Created enrollment
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    enrollment: { $ref: '#/components/schemas/Enrollment' }
                '404': { $ref: '#/components/responses/NotFound' }
                '409': { $ref: '#/components/responses/Conflict' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /enrollments:
        get:
            tags: [Enrollment]
            summary: List my enrollments (paginated)
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
            responses:
                '200':
                    description: My enrollments
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    enrollments:
                                        type: array
                                        items: { $ref: '#/components/schemas/Enrollment' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '401': { $ref: '#/components/responses/Unauthorized' }
    /enrollments/{id}:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Enrollment ULID }
        get:
            tags: [Enrollment]
            summary: Get one of my enrollments (with progress)
            responses:
                '200':
                    description: The enrollment
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    enrollment: { $ref: '#/components/schemas/Enrollment' }
                '404': { $ref: '#/components/responses/NotFound' }
        delete:
            tags: [Enrollment]
            summary: Unenroll (deletes the enrollment and its progress)
            responses:
                '204': { description: Unenrolled }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{id}/reviews:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
        get:
            tags: [Review]
            summary: List a course's reviews (paginated)
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
            responses:
                '200':
                    description: The course's reviews
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    reviews:
                                        type: array
                                        items: { $ref: '#/components/schemas/Review' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Review]
            summary: Review a course
            description: The student must be enrolled in the course and may review it only once. Posting refreshes the course's cached rating average and count.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [rating]
                            properties:
                                rating: { type: integer, minimum: 1, maximum: 5 }
                                body: { type: string, nullable: true }
            responses:
                '201':
                    description: Created review
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    review: { $ref: '#/components/schemas/Review' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '404': { $ref: '#/components/responses/NotFound' }
                '409': { $ref: '#/components/responses/Conflict' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /reviews/{id}:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Review ULID }
        patch:
            tags: [Review]
            summary: Update my review
            description: Only the review's author may update it. Recomputes the course's cached rating stats.
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                rating: { type: integer, minimum: 1, maximum: 5 }
                                body: { type: string, nullable: true }
            responses:
                '200':
                    description: Updated review
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    review: { $ref: '#/components/schemas/Review' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
        delete:
            tags: [Review]
            summary: Delete my review
            description: Only the review's author may delete it. Recomputes the course's cached rating stats.
            responses:
                '204': { description: Review deleted }
                '404': { $ref: '#/components/responses/NotFound' }
    /certificates:
        get:
            tags: [Certificate]
            summary: List my certificates (paginated)
            description: Certificates are issued automatically when a student completes a certificate-enabled course.
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
            responses:
                '200':
                    description: My certificates
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    certificates:
                                        type: array
                                        items: { $ref: '#/components/schemas/Certificate' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '401': { $ref: '#/components/responses/Unauthorized' }
    /certificates/{id}/download:
        get:
            tags: [Certificate]
            summary: Download my certificate as a PDF
            description: Streams the certificate as an inline landscape A4 PDF. Owner only.
            parameters:
                - { name: id, in: path, required: true, schema: { type: string }, description: Certificate ULID }
            responses:
                '200':
                    description: The certificate PDF
                    content:
                        application/pdf:
                            schema: { type: string, format: binary }
                '404': { $ref: '#/components/responses/NotFound' }
    /certificates/verify/{credentialId}:
        get:
            tags: [Certificate]
            summary: Publicly verify a certificate by its credential ID
            description: Public endpoint (no authentication). Returns the certificate's issue-time snapshot so a third party can confirm it is genuine. No PDF is returned.
            security: []
            parameters:
                - { name: credentialId, in: path, required: true, schema: { type: string }, description: '32-character hex credential token' }
            responses:
                '200':
                    description: The certificate is valid
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    valid: { type: boolean, example: true }
                                    certificate: { $ref: '#/components/schemas/Certificate' }
                '404': { $ref: '#/components/responses/NotFound' }
    /courses/{id}/quiz:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
        get:
            tags: [Quiz]
            summary: Get the course's quiz (take-view)
            description: Returns the quiz with its questions and choices. Correct-answer flags are never included.
            responses:
                '200':
                    description: The quiz
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    quiz: { $ref: '#/components/schemas/Quiz' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Quiz]
            summary: Create or replace the course's quiz (owner only)
            description: Atomically replaces the course's quiz definition. Each question must have exactly one correct choice. Existing attempts are kept as history.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [title, questions]
                            properties:
                                title: { type: string }
                                pass_threshold_percent: { type: integer, minimum: 1, maximum: 100, default: 70 }
                                questions:
                                    type: array
                                    items:
                                        type: object
                                        required: [text, choices]
                                        properties:
                                            text: { type: string }
                                            choices:
                                                type: array
                                                items:
                                                    type: object
                                                    required: [text, is_correct]
                                                    properties:
                                                        text: { type: string }
                                                        is_correct: { type: boolean }
            responses:
                '200':
                    description: The saved quiz
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    quiz: { $ref: '#/components/schemas/Quiz' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /courses/{id}/quiz/attempts:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
        get:
            tags: [Quiz]
            summary: List my attempts at this course's quiz (paginated)
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
            responses:
                '200':
                    description: My quiz attempts
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    attempts:
                                        type: array
                                        items: { $ref: '#/components/schemas/QuizAttempt' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '404': { $ref: '#/components/responses/NotFound' }
        post:
            tags: [Quiz]
            summary: Submit answers to the course's quiz
            description: Grades the submission and records the attempt. The student must be enrolled. Passing the quiz when the course content is also complete issues the certificate.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [answers]
                            properties:
                                answers:
                                    type: object
                                    description: 'Map of question ULID to the chosen choice ULID'
                                    additionalProperties: { type: string }
            responses:
                '201':
                    description: The graded attempt
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    attempt: { $ref: '#/components/schemas/QuizAttempt' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /courses/{id}/purchase:
        post:
            tags: [Orders]
            summary: Start a one-off purchase of a course
            description: Creates a pending order and returns the signed PayFast checkout fields to POST to PayFast. Course must be published and purchasable.
            parameters:
                - { name: id, in: path, required: true, schema: { type: string }, description: Course ULID }
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                coupon_code: { type: string, nullable: true, description: Optional discount code }
            responses:
                '201':
                    description: Pending order + PayFast checkout
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    order: { $ref: '#/components/schemas/Order' }
                                    payfast:
                                        type: object
                                        properties:
                                            url: { type: string, description: PayFast process URL to POST the form to }
                                            fields: { type: object, additionalProperties: { type: string }, description: Signed form fields (incl. signature) }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '409': { $ref: '#/components/responses/Conflict' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /orders:
        get:
            tags: [Orders]
            summary: List my orders (paginated)
