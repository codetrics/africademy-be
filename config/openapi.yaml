                        schema:
                            type: object
                            required: [name]
                            properties:
                                name: { type: string, minLength: 2, maxLength: 100 }
            responses:
                '200':
                    description: Updated category
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    category: { $ref: '#/components/schemas/BlogCategory' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
        delete:
            tags: [Blog]
            summary: Delete a blog category (admin)
            description: Fails with 409 if the category still has posts.
            responses:
                '204': { description: Category deleted }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '409': { $ref: '#/components/responses/Conflict' }
    /newsletter/subscribe:
        post:
            tags: [Newsletter]
            summary: Subscribe to the newsletter
            description: >-
                Public, rate-limited endpoint. Starts a double opt-in: a confirmation email is queued and the
                subscription stays pending until the user confirms via GET /newsletter/confirm.
            security: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [email]
                            properties:
                                email: { type: string, format: email }
            responses:
                '201': { description: Subscribed }
                '400': { $ref: '#/components/responses/BadRequest' }
                '409': { $ref: '#/components/responses/Conflict' }
                '422': { $ref: '#/components/responses/ValidationError' }
                '429': { $ref: '#/components/responses/RateLimited' }
    /newsletter/confirm:
        get:
            tags: [Newsletter]
            summary: Confirm a newsletter subscription (double opt-in)
            description: Public endpoint. Confirms a pending subscription via the token from the confirmation email.
            security: []
            parameters:
                - { name: token, in: query, required: true, schema: { type: string } }
            responses:
                '200': { description: Subscription confirmed }
                '400': { $ref: '#/components/responses/BadRequest' }
                '404': { $ref: '#/components/responses/NotFound' }
    /newsletter/unsubscribe:
        get:
            tags: [Newsletter]
            summary: Unsubscribe via token
            description: Public endpoint. The token is delivered in the newsletter emails' unsubscribe link.
            security: []
            parameters:
                - { name: token, in: query, required: true, schema: { type: string } }
            responses:
                '200': { description: Unsubscribed }
                '400': { $ref: '#/components/responses/BadRequest' }
                '404': { $ref: '#/components/responses/NotFound' }
    /admin/analytics/overview:
        get:
            tags: [Analytics]
            summary: Dashboard overview KPIs (admin)
            description: Headline metrics across users, revenue, subscriptions, enrollments, courses and reviews. Money in cents (ZAR).
            responses:
                '200':
                    description: Overview metrics
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    users:
                                        type: object
                                        properties:
                                            total: { type: integer }
                                            new_last_30_days: { type: integer }
                                            verified: { type: integer }
                                    revenue:
                                        type: object
                                        properties:
                                            currency: { type: string, example: ZAR }
                                            total_cents: { type: integer }
                                            last_30_days_cents: { type: integer }
                                            refunded_cents: { type: integer }
                                            mrr_cents: { type: integer, description: Monthly recurring revenue (annual plans normalised /12) }
                                    subscriptions:
                                        type: object
                                        additionalProperties: { type: integer }
                                        description: Active/past_due/cancelled/expired counts keyed by status
                                    enrollments:
                                        type: object
                                        properties:
                                            total: { type: integer }
                                            completed: { type: integer }
                                    courses:
                                        type: object
                                        properties:
                                            published: { type: integer }
                                    reviews:
                                        type: object
                                        properties:
                                            average_rating: { type: number, format: float }
                                    refund_requests:
                                        type: object
                                        properties:
                                            pending: { type: integer }
                '403': { $ref: '#/components/responses/Forbidden' }
    /admin/analytics/revenue:
        get:
            tags: [Analytics]
            summary: Revenue time-series (admin)
            description: Paid orders + paid subscription payments bucketed by day or month. Defaults to the last 30 days.
            parameters:
                - { name: from, in: query, schema: { type: string, format: date }, description: 'Start date (YYYY-MM-DD)' }
                - { name: to, in: query, schema: { type: string, format: date }, description: 'End date (YYYY-MM-DD)' }
                - { name: interval, in: query, schema: { type: string, enum: [day, month], default: day } }
            responses:
                '200':
                    description: Revenue series
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    interval: { type: string, enum: [day, month] }
                                    from: { type: string, format: date }
                                    to: { type: string, format: date }
                                    series:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                bucket: { type: string }
                                                amount_cents: { type: integer }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/analytics/enrollments:
        get:
            tags: [Analytics]
            summary: Enrollment time-series (admin)
            description: New enrollments bucketed by day or month. Defaults to the last 30 days.
            parameters:
                - { name: from, in: query, schema: { type: string, format: date } }
                - { name: to, in: query, schema: { type: string, format: date } }
                - { name: interval, in: query, schema: { type: string, enum: [day, month], default: day } }
            responses:
                '200':
                    description: Enrollment series
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    interval: { type: string, enum: [day, month] }
                                    from: { type: string, format: date }
                                    to: { type: string, format: date }
                                    series:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                bucket: { type: string }
                                                count: { type: integer }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/analytics/top-courses:
        get:
            tags: [Analytics]
            summary: Top published courses (admin)
            description: Ranked by enrollment count or rating.
            parameters:
                - { name: by, in: query, schema: { type: string, enum: [enrollment, rating], default: enrollment } }
                - { name: limit, in: query, schema: { type: integer, default: 5, maximum: 20 } }
            responses:
                '200':
                    description: Ranked courses
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    by: { type: string, enum: [enrollment, rating] }
                                    courses:
                                        type: array
                                        items: { $ref: '#/components/schemas/Course' }
                '403': { $ref: '#/components/responses/Forbidden' }
    /admin/students:
        get:
            tags: [Admin]
            summary: Student directory (admin, paginated)
            description: Search the user base by email or profile name and filter by account status.
            parameters:
                - { name: q, in: query, schema: { type: string }, description: Search email / first / last name }
                - { name: status, in: query, schema: { type: string, enum: [active, suspended] } }
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 20 } }
            responses:
                '200':
                    description: Matching students
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    students:
                                        type: array
                                        items: { $ref: '#/components/schemas/User' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/students/{id}:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: User ULID }
        get:
            tags: [Admin]
            summary: Student detail with summary and recent activity (admin)
            responses:
                '200':
                    description: Student detail
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    student: { $ref: '#/components/schemas/User' }
                                    summary:
                                        type: object
                                        properties:
                                            enrollments:
                                                type: object
                                                properties:
                                                    total: { type: integer }
                                                    completed: { type: integer }
                                            orders:
                                                type: object
                                                properties:
                                                    total: { type: integer }
                                                    total_spent_cents: { type: integer }
                                                    currency: { type: string, example: ZAR }
                                            subscription_status: { type: string, nullable: true, enum: [active, past_due, cancelled, expired, null] }
                                    recent_activity:
                                        type: array
                                        items: { $ref: '#/components/schemas/UserLog' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /admin/facilitators:
        get:
            tags: [Admin]
            summary: Facilitator directory (admin, paginated)
            description: List users holding ROLE_FACILITATOR, filterable by free-text and account status. Filter by `pending_review` to find facilitators awaiting approval.
            parameters:
                - { name: q, in: query, schema: { type: string }, description: Search email / first / last name }
                - { name: status, in: query, schema: { type: string, enum: [active, pending_review, rejected, suspended] } }
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 20 } }
            responses:
                '200':
                    description: Matching facilitators
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    facilitators:
                                        type: array
                                        items: { $ref: '#/components/schemas/User' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/facilitators/{id}/approve:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: User ULID }
        post:
            tags: [Admin]
            summary: Approve a pending facilitator (admin)
            description: Activates a facilitator account that is pending review and emails them the decision.
            responses:
                '204': { description: Facilitator approved }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/facilitators/{id}/reject:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: User ULID }
        post:
            tags: [Admin]
            summary: Reject a pending facilitator (admin)
            description: Rejects a facilitator account that is pending review and emails them the decision.
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                reason: { type: string, description: Optional reason included in the rejection email }
            responses:
                '204': { description: Facilitator rejected }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/activity:
        get:
            tags: [Admin]
            summary: Activity feed from UserLog (admin, paginated)
            description: Audit/activity events, newest first, filterable by log type, free-text and a date window.
            parameters:
                - { name: type, in: query, schema: { type: string }, description: 'Log type slug (e.g. login, payment_completed)' }
                - { name: q, in: query, schema: { type: string }, description: Search username / message }
                - { name: from, in: query, schema: { type: string, format: date } }
                - { name: to, in: query, schema: { type: string, format: date } }
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 25 } }
            responses:
                '200':
                    description: Activity events
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    activity:
                                        type: array
                                        items: { $ref: '#/components/schemas/UserLog' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '403': { $ref: '#/components/responses/Forbidden' }
    /admin/email-campaigns:
        get:
            tags: [Admin]
            summary: List email campaigns (admin, paginated)
            parameters:
                - { name: page, in: query, schema: { type: integer, default: 1 } }
                - { name: limit, in: query, schema: { type: integer, default: 10 } }
            responses:
                '200':
                    description: Campaigns
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    campaigns:
                                        type: array
                                        items: { $ref: '#/components/schemas/EmailCampaign' }
                                    pagination: { $ref: '#/components/schemas/Pagination' }
                '403': { $ref: '#/components/responses/Forbidden' }
        post:
            tags: [Admin]
            summary: Create an email campaign (draft)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [subject, heading, body, segment]
                            properties:
                                subject: { type: string, maxLength: 150 }
                                heading: { type: string, maxLength: 150 }
                                body: { type: string }
                                segment: { type: string, enum: [all_students, active_subscribers, newsletter_subscribers] }
            responses:
                '201':
                    description: Created draft campaign
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    campaign: { $ref: '#/components/schemas/EmailCampaign' }
                '400': { $ref: '#/components/responses/BadRequest' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '422': { $ref: '#/components/responses/ValidationError' }
    /admin/email-campaigns/{id}:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: EmailCampaign ULID }
        get:
            tags: [Admin]
            summary: Get an email campaign (admin)
            responses:
                '200':
                    description: The campaign
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    campaign: { $ref: '#/components/schemas/EmailCampaign' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
    /admin/email-campaigns/{id}/send:
        parameters:
            - { name: id, in: path, required: true, schema: { type: string }, description: EmailCampaign ULID }
        post:
            tags: [Admin]
            summary: Send a campaign (admin)
            description: Queues one email per recipient in the segment via the notification pipeline. Idempotent guard — a sent campaign returns 409.
            responses:
                '200':
                    description: Sent campaign with recipient count
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    campaign: { $ref: '#/components/schemas/EmailCampaign' }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
                '409': { $ref: '#/components/responses/Conflict' }
components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    parameters:
        PageParam:
            name: page
            in: query
            description: 1-based page number.
            schema: { type: integer, default: 1, minimum: 1 }
        LimitParam:
            name: limit
            in: query
            description: Items per page.
            schema: { type: integer, default: 10, minimum: 1 }
    schemas:
        User:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                email: { type: string, format: email }
                roles: { type: array, items: { type: string }, description: 'Base ROLE_USER is always present, plus any grantable ROLE_STUDENT/ROLE_FACILITATOR/ROLE_ADMIN' }
                status: { type: string, enum: [active, pending_review, rejected, suspended] }
                email_verified: { type: boolean }
                email_verified_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                profile: { $ref: '#/components/schemas/Profile' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Profile:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                first_name: { type: string }
                last_name: { type: string }
                display_name: { type: string, description: Computed from first and last name }
                avatar: { type: string, nullable: true, description: 'Absolute URL to the avatar stream endpoint, or null' }
                bio: { type: string, nullable: true }
                phone: { type: string, nullable: true }
                locale: { type: string, example: en }
                timezone: { type: string, example: Africa/Johannesburg }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Error:
            type: object
            properties:
                error: { type: string, example: validation_error }
                error_description: { type: string, example: Email cannot be blank. }
        Money:
            type: object
            properties:
                amount_cents: { type: integer, example: 450000 }
                currency: { type: string, example: ZAR }
        Category:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                name: { type: string, example: Wealth }
                slug: { type: string, example: wealth }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Course:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                title: { type: string }
                slug: { type: string, description: Generated from the title }
                tagline: { type: string, nullable: true }
                description: { type: string, nullable: true }
                status: { type: string, enum: [draft, published, archived] }
                level: { type: string, nullable: true, enum: [beginner, intermediate, advanced] }
                category: { $ref: '#/components/schemas/Category' }
                instructor:
                    type: object
                    description: Compact owner view (never exposes the owner's account)
                    properties:
                        id: { type: string }
                        name: { type: string }
                price: { $ref: '#/components/schemas/Money' }
                is_free: { type: boolean }
                is_purchasable: { type: boolean }
                included_in_subscription: { type: boolean }
                certificate_enabled: { type: boolean, description: 'Whether completing the course issues a certificate' }
                requires_quiz: { type: boolean, description: 'Whether completion requires passing a quiz (defers auto-issuing until the quiz gate exists)' }
                rating_average: { type: number, format: float, description: 'Cached average of all review ratings (0 when none)', example: 4.5 }
                rating_count: { type: integer, description: 'Cached number of reviews', example: 12 }
                enrollment_count: { type: integer, description: 'Cached number of active enrollments', example: 87 }
                tags: { type: array, items: { type: string } }
                objectives: { type: array, items: { type: string } }
                thumbnail: { type: string, nullable: true }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Lesson:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                course_id: { type: string, description: Parent course ULID }
                title: { type: string }
                body: { type: string, nullable: true }
                type: { type: string, enum: [video, doc] }
                status: { type: string, enum: [draft, published] }
                position: { type: integer }
                duration_minutes: { type: integer, nullable: true }
                content_ref: { type: string, nullable: true, description: External embed reference (e.g. a YouTube/Vimeo URL) }
                video_url: { type: string, nullable: true, description: 'Absolute URL to the hosted-video stream endpoint, or null' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Pagination:
            type: object
            properties:
                current_page: { type: integer, example: 1 }
                items_per_page: { type: integer, example: 10 }
                total_items: { type: integer, example: 42 }
                total_pages: { type: integer, example: 5 }
        Progress:
            type: object
            properties:
                progress_percent: { type: integer, example: 50 }
                completed_count: { type: integer, example: 1 }
                total_count: { type: integer, description: Published lessons only, example: 2 }
                current_lesson_id: { type: string, nullable: true, description: 'First incomplete published lesson, or null if all done' }
                status: { type: string, enum: [in_progress, completed] }
        Enrollment:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                course: { $ref: '#/components/schemas/Course' }
                status: { type: string, enum: [in_progress, completed] }
                completed_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                progress: { $ref: '#/components/schemas/Progress' }
                created_at: { type: integer, description: Unix timestamp (enrolled-at) }
                updated_at: { type: integer, description: Unix timestamp }
        Review:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                course_id: { type: string, description: Reviewed course ULID }
                reviewer: { type: string, description: Display name of the student who wrote the review }
                rating: { type: integer, minimum: 1, maximum: 5 }
                body: { type: string, nullable: true, description: 'Optional written review (max 2000 chars)' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        CommunityPost:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                author: { type: string, description: Display name of the author }
                tag: { type: string, enum: [resource, question, showcase, mentorship] }
                title: { type: string }
                body: { type: string }
                image: { type: string, nullable: true, description: 'Absolute URL to the image stream endpoint, or null' }
                link_url: { type: string, nullable: true }
                like_count: { type: integer }
                comment_count: { type: integer }
                status: { type: string, enum: [published, hidden] }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        CommunityComment:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                author: { type: string, description: Display name of the author }
                body: { type: string }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        EmailCampaign:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                subject: { type: string }
                heading: { type: string }
                body: { type: string }
                segment: { type: string, enum: [all_students, active_subscribers, newsletter_subscribers] }
                status: { type: string, enum: [draft, sent] }
                recipient_count: { type: integer }
                sent_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        UserLog:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                type: { type: string, description: Log type slug }
                username: { type: string, nullable: true }
                message: { type: string }
                ip_address: { type: string, nullable: true }
                user_agent: { type: string, nullable: true }
                context: { type: object, nullable: true, additionalProperties: true }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        BlogCategory:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                name: { type: string }
                slug: { type: string }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        BlogPost:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                slug: { type: string }
                category: { $ref: '#/components/schemas/BlogCategory' }
                author: { type: string, description: Display name of the author }
                title: { type: string }
                excerpt: { type: string }
                body: { type: string }
                cover_image: { type: string, nullable: true, description: 'Absolute URL to the cover stream endpoint, or null' }
                read_time_minutes: { type: integer, description: Estimated reading time in minutes }
                is_featured: { type: boolean }
                status: { type: string, enum: [draft, published] }
                published_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Certificate:
            type: object
            description: 'Snapshot fields are captured at issue time so a later rename never alters an issued certificate.'
            properties:
                id: { type: string, description: ULID public identifier }
                credential_id: { type: string, description: 'Public, URL-safe credential token used for verification', example: 6978e70cdc378abed468f32ac2ab63df }
                course_id: { type: string, description: Course ULID }
                student_name: { type: string, description: Recipient name at issue time }
                course_title: { type: string, description: Course title at issue time }
                instructor_name: { type: string, description: Instructor name at issue time }
                created_at: { type: integer, description: Unix timestamp (issued-at) }
                updated_at: { type: integer, description: Unix timestamp }
        Choice:
            type: object
            description: 'A possible answer. The correct-answer flag is never exposed to students.'
            properties:
                id: { type: string, description: ULID public identifier }
                text: { type: string }
                position: { type: integer }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Question:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                text: { type: string }
                type: { type: string, enum: [single_choice] }
                position: { type: integer }
                choices: { type: array, items: { $ref: '#/components/schemas/Choice' } }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Quiz:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                course_id: { type: string, description: Course ULID }
                title: { type: string }
                pass_threshold_percent: { type: integer, minimum: 1, maximum: 100, description: 'Minimum score to pass', example: 70 }
                questions: { type: array, items: { $ref: '#/components/schemas/Question' } }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        QuizAttempt:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                score_percent: { type: integer, description: 'Percentage of questions answered correctly' }
                passed: { type: boolean }
                answers:
                    type: object
                    description: 'Map of question ULID to the chosen choice ULID'
                    additionalProperties: { type: string }
                created_at: { type: integer, description: Unix timestamp (submitted-at) }
                updated_at: { type: integer, description: Unix timestamp }
        LearnLesson:
            allOf:
                - { $ref: '#/components/schemas/Lesson' }
                - type: object
                  properties:
                      state: { type: string, enum: [done, current, upcoming] }
        Order:
            type: object
            description: Exactly one of course or bundle is set.
            properties:
                id: { type: string, description: ULID public identifier }
                course: { allOf: [{ $ref: '#/components/schemas/Course' }], nullable: true }
                bundle: { allOf: [{ $ref: '#/components/schemas/Bundle' }], nullable: true }
                amount: { $ref: '#/components/schemas/Money' }
                discount_amount_cents: { type: integer, description: Coupon discount applied }
                status: { type: string, enum: [pending, paid, cancelled, refunded] }
                paid_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                refunded_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        RefundRequest:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                order_id: { type: string, description: Order ULID }
                order: { $ref: '#/components/schemas/Order' }
                reason: { type: string, nullable: true }
                status: { type: string, enum: [pending, approved, rejected] }
                resolved_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Coupon:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                code: { type: string, example: SAVE20 }
                discount_type: { type: string, enum: [percent, fixed] }
                discount_value: { type: integer, description: 'Percent points or cents' }
                max_redemptions: { type: integer, nullable: true }
                redemption_count: { type: integer }
                min_amount_cents: { type: integer, nullable: true }
                expires_at: { type: integer, nullable: true, description: 'Unix timestamp, or null' }
                is_active: { type: boolean }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Bundle:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                title: { type: string }
                slug: { type: string }
                description: { type: string, nullable: true }
                price: { $ref: '#/components/schemas/Money' }
                thumbnail: { type: string, nullable: true }
                status: { type: string, enum: [draft, published] }
                instructor: { type: object, properties: { id: { type: string }, name: { type: string } } }
                courses: { type: array, items: { $ref: '#/components/schemas/Course' } }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        SubscriptionPlan:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                name: { type: string, example: Premium }
                slug: { type: string, example: premium-monthly }
                price: { $ref: '#/components/schemas/Money' }
                interval: { type: string, enum: [monthly, annual] }
                is_active: { type: boolean }
        PaymentMethod:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                brand: { type: string, example: visa }
                last4: { type: string, example: '4242' }
                exp_month: { type: string, nullable: true, example: '12' }
                exp_year: { type: string, nullable: true, example: '2030' }
                is_default: { type: boolean }
                status: { type: string, enum: [active, deleted] }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
        Subscription:
            type: object
            properties:
                id: { type: string, description: ULID public identifier }
                plan: { $ref: '#/components/schemas/SubscriptionPlan' }
                payment_method: { $ref: '#/components/schemas/PaymentMethod' }
                status: { type: string, enum: [active, past_due, cancelled, expired] }
                current_period_start: { type: integer, description: Unix timestamp }
                current_period_end: { type: integer, description: Unix timestamp }
                cancel_at_period_end: { type: boolean }
                created_at: { type: integer, description: Unix timestamp }
                updated_at: { type: integer, description: Unix timestamp }
    responses:
        BadRequest:
            description: Malformed request or invalid JSON
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        Unauthorized:
            description: Missing or invalid credentials
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        Forbidden:
            description: Authenticated but not permitted (e.g. not the owner, or missing ROLE_FACILITATOR)
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        Conflict:
            description: Conflicts with current state (e.g. already enrolled)
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        ValidationError:
            description: Validation failed
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        RateLimited:
            description: Too many requests
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        PayloadTooLarge:
            description: Uploaded file exceeds the maximum allowed size
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
        GatewayError:
            description: Upstream payment gateway error
            content:
                application/json:
                    schema: { $ref: '#/components/schemas/Error' }
