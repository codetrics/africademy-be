                    description: Approved refund request
                    content:
                        application/json:
                            schema: { type: object, properties: { refund_request: { $ref: '#/components/schemas/RefundRequest' } } }
                '403': { $ref: '#/components/responses/Forbidden' }
                '404': { $ref: '#/components/responses/NotFound' }
